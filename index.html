<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบบันทึกและจัดเก็บข้อมูลตาราง</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Noto Sans Thai', sans-serif;
}

body {
    background-color: #f0f4f8;
    color: #333;
    padding: 40px 20px;
}

.container {
    max-width: 1100px;
    margin: 0 auto;
}

/* ส่วนหัวข้อเว็บ */
.header {
    text-align: center;
    margin-bottom: 30px;
}

.header h1 {
    color: #2c3e50;
    font-size: 2rem;
    margin-bottom: 8px;
}

.header p {
    color: #7f8c8d;
    font-size: 1rem;
}

/* การจัดวางแบ่งเป็น 2 ฝั่ง (ฟอร์มกรอกข้อมูล และ ตารางแสดงผล) */
.main-content {
    display: table;
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 20px 0;
}

.form-section, .table-section {
    display: table-cell;
    vertical-align: top;
    background: #ffffff;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.form-section {
    width: 35%;
}

.table-section {
    width: 65%;
}

h2 {
    font-size: 1.25rem;
    color: #2c3e50;
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 2px solid #eaeded;
}

/* สไตล์ของฟอร์มกรอกข้อมูล */
.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-size: 0.9rem;
    color: #34495e;
    margin-bottom: 6px;
    font-weight: 500;
}

.form-group input, .form-group select {
    width: 100%;
    padding: 10px 14px;
    font-size: 0.95rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    transition: 0.2s;
}

.form-group input:focus, .form-group select:focus {
    border-color: #3498db;
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
}

.btn-submit {
    width: 100%;
    padding: 12px;
    background-color: #2ecc71;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
}

.btn-submit:hover {
    background-color: #27ae60;
}

/* ส่วนของตารางและช่องค้นหา */
.search-box {
    width: 100%;
    padding: 10px 14px;
    font-size: 0.95rem;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    margin-bottom: 20px;
    outline: none;
}

.search-box:focus {
    border-color: #3498db;
}

.table-responsive {
    overflow-x: auto;
}

.data-table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 0.95rem;
}

.data-table th {
    background-color: #34495e;
    color: #ffffff;
    padding: 12px;
    font-weight: 500;
}

.data-table td {
    padding: 12px;
    border-bottom: 1px solid #e2e8f0;
}

.data-table tbody tr:nth-child(even) {
    background-color: #f8fafc;
}

/* ปุ่มลบข้อมูล */
.btn-delete {
    padding: 6px 12px;
    background-color: #e74c3c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: 0.2s;
}

.btn-delete:hover {
    background-color: #c0392b;
}

.no-data {
    text-align: center;
    color: #94a3b8;
    padding: 20px;
}

/* ปรับแต่งสำหรับหน้าจอมือถือ */
@media (max-width: 768px) {
    .main-content, .form-section, .table-section {
        display: block;
        width: 100%;
    }
    .form-section {
        margin-bottom: 20px;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 ระบบจัดเก็บข้อมูลตารางอเนกประสงค์</h1>
        <p>กรอกข้อมูลเพื่อบันทึกลงฐานข้อมูลตารางจำลอง สามารถค้นหาและลบข้อมูลได้</p>
    </div>

    <div class="main-content">
        <div class="form-section">
            <h2>➕ เพิ่มข้อมูลใหม่</h2>
            <form id="dataForm" onsubmit="addData(event)">
                <div class="form-group">
                    <label for="inputCode">รหัส/ID</label>
                    <input type="text" id="inputCode" placeholder="ตัวอย่าง: REF-001" required>
                </div>
                <div class="form-group">
                    <label for="inputName">ชื่อรายการ</label>
                    <input type="text" id="inputName" placeholder="กรอกชื่อรายการหรือชื่อสัตว์" required>
                </div>
                <div class="form-group">
                    <label for="inputCategory">หมวดหมู่</label>
                    <select id="inputCategory" required>
                        <option value="">-- เลือกหมวดหมู่ --</option>
                        <option value="สัตว์ป่า">สัตว์ป่า</option>
                        <option value="สัตว์เลี้ยง">สัตว์เลี้ยง</option>
                        <option value="สัตว์ปีก">สัตว์ปีก</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="inputNote">หมายเหตุ / รายละเอียด</label>
                    <input type="text" id="inputNote" placeholder="ระบุรายละเอียดเพิ่มเติม (ถ้ามี)">
                </div>
                <button type="submit" class="btn-submit">💾 บันทึกข้อมูล</button>
            </form>
        </div>

        <div class="table-section">
            <h2>🗃️ รายการข้อมูลทั้งหมด</h2>
            
            <input type="text" id="searchBox" class="search-box" onkeyup="searchTable()" placeholder="🔍 ค้นหาข้อมูลในตารางอย่างรวดเร็ว...">

            <div class="table-responsive">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>รหัส (ID)</th>
                            <th>ชื่อรายการ</th>
                            <th>หมวดหมู่</th>
                            <th>หมายเหตุ</th>
                            <th style="text-align: center;">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td><strong>ANI-001</strong></td>
                            <td>เสือโคร่งอินโดจีน</td>
                            <td>สัตว์ป่า</td>
                            <td>สัตว์ป่าคุ้มครอง</td>
                            <td style="text-align: center;"><button class="btn-delete" onclick="deleteRow(this)">ลบ</button></td>
                        </tr>
                        <tr>
                            <td><strong>ANI-002</strong></td>
                            <td>นกเงือก</td>
                            <td>สัตว์ปีก</td>
                            <td>สัญลักษณ์แห่งความรักแท้</td>
                            <td style="text-align: center;"><button class="btn-delete" onclick="deleteRow(this)">ลบ</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// ฟังก์ชันเพิ่มข้อมูลจากฟอร์มลงตาราง
function addData(event) {
    event.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรชเมื่อกดบันทึก

    // ดึงค่าจากฟอร์มกรอกข้อมูล
    const code = document.getElementById('inputCode').value;
    const name = document.getElementById('inputName').value;
    const category = document.getElementById('inputCategory').value;
    const note = document.getElementById('inputNote').value || "-";

    const tableBody = document.getElementById('tableBody');

    // สร้างแถว (tr) ใหม่ในตาราง
    const newRow = document.createElement('tr');
    newRow.innerHTML = `
        <td><strong>${code}</strong></td>
        <td>${name}</td>
        <td>${category}</td>
        <td>${note}</td>
        <td style="text-align: center;"><button class="btn-delete" onclick="deleteRow(this)">ลบ</button></td>
    `;

    // เพิ่มแถวใหม่ลงไปในตาราง
    tableBody.appendChild(newRow);

    // เคลียร์ค่าในฟอร์มหลังจากบันทึกเสร็จ เพื่อให้กรอกรายการต่อไปได้
    document.getElementById('dataForm').reset();
}

// ฟังก์ชันลบแถวข้อมูลออกจากตาราง
function deleteRow(button) {
    if(confirm("คุณต้องการลบข้อมูลรายการนี้ใช่หรือไม่?")) {
        // หาแถว (tr) ที่เป็นพ่อของปุ่มลบ แล้วลบออก
        const row = button.parentElement.parentElement;
        row.remove();
    }
}

// ฟังก์ชันค้นหาข้อมูลในตารางแบบเรียลไทม์ (Live Search)
function searchTable() {
    const input = document.getElementById('searchBox');
    const filter = input.value.toUpperCase();
    const table = document.getElementById('dataTable');
    const tr = table.getElementsByTagName('tr');

    // วนลูปตรวจสอบข้อมูลทุกแถวในตาราง (เริ่มที่แถวที่ 1 ข้ามส่วนหัว th)
    for (let i = 1; i < tr.length; i++) {
        let match = false;
        const td = tr[i].getElementsByTagName('td');
        
        // ตรวจสอบทุกคอลัมน์ในแถวนั้นๆ
        for (let j = 0; j < td.length - 1; j++) { // -1 เพื่อข้ามคอลัมน์ปุ่มลบ
            if (td[j]) {
                const txtValue = td[j].textContent || td[j].innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    match = true;
                    break;
                }
            }
        }
        
        // ถ้าข้อมูลตรงกับคำค้นหาให้แสดงแถว ถ้าไม่ตรงให้ซ่อนแถวไว้
        if (match) {
            tr[i].style.display = "";
        } else {
            tr[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
